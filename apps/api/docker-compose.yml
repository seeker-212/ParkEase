version: "3.9"

services:
  db:
    image: postgres:17
    container_name: parkease-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: parkease
      POSTGRES_PASSWORD: password
     
    ports:
      - "2010:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: